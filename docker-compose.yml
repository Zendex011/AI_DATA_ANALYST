services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-data-analyst-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ai_data_analyst
      POSTGRES_PASSWORD: MEERUT1234
      POSTGRES_DB: ai_data_analyst
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_data_analyst"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ai-data-analyst-cache
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata: